<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KODATA Insight Engine</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .no-print { display: flex; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        // API 설정
        const apiKey = ""; 
        const MODEL_NAME = "gemini-2.5-flash-preview-09-2025";

        // 아이콘 컴포넌트 (Lucide 사용)
        const Icon = ({ name, className, size = 24 }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const App = () => {
            const [file, setFile] = useState(null);
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [analysisResult, setAnalysisResult] = useState(null);
            const [error, setError] = useState(null);
            const [dragActive, setDragActive] = useState(false);
            const reportRef = useRef(null);

            // PDF 다운로드 로직
            const downloadPDF = async () => {
                if (!reportRef.current) return;
                const btn = document.getElementById('download-btn');
                if (btn) btn.style.setProperty('display', 'none', 'important');

                try {
                    const canvas = await html2canvas(reportRef.current, {
                        scale: 2,
                        useCORS: true,
                        backgroundColor: '#f8fafc'
                    });
                    const imgData = canvas.toDataURL('image/png');
                    const { jsPDF } = window.jspdf;
                    const pdf = new jsPDF('p', 'mm', 'a4');
                    const imgProps = pdf.getImageProperties(imgData);
                    const pdfWidth = pdf.internal.pageSize.getWidth();
                    const pdfHeight = (imgProps.height * pdfWidth) / imgProps.width;
                    
                    pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
                    pdf.save(`KODATA_Analysis_${new Date().getTime()}.pdf`);
                } catch (err) {
                    console.error(err);
                    setError('PDF 생성 중 오류가 발생했습니다.');
                } finally {
                    if (btn) btn.style.setProperty('display', 'flex', 'important');
                }
            };

            const analyzeReport = async (fileObject) => {
                if (!fileObject) return;
                setIsAnalyzing(true);
                setError(null);
                setAnalysisResult(null);

                try {
                    const base64Data = await new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.onload = (e) => resolve(e.target.result.split(',')[1]);
                        reader.onerror = reject;
                        reader.readAsDataURL(fileObject);
                    });

                    const systemPrompt = `
                        당신은 대한민국 기업 분석 전문가 팀입니다. JSON 형식으로만 응답하십시오.
                        스키마: { "summary": "총평", "expertAnalyses": [{ "category": "재무|세무|노무|보험", "metrics": "지표", "diagnosis": "진단", "score": 0~100 }] }
                    `;

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [
                                    { text: "이 KODATA 보고서를 분석해주세요." },
                                    { inlineData: { mimeType: "application/pdf", data: base64Data } }
                                ]
                            }],
                            systemInstruction: { parts: [{ text: systemPrompt }] },
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });

                    if (!response.ok) throw new Error('API 분석 요청에 실패했습니다.');
                    const result = await response.json();
                    const content = JSON.parse(result.candidates[0].content.parts[0].text);
                    setAnalysisResult(content);
                } catch (err) {
                    setError(`오류 발생: ${err.message}`);
                } finally {
                    setIsAnalyzing(false);
                }
            };

            const getCategoryIcon = (category) => {
                switch (category) {
                    case '재무': return 'bar-chart-3';
                    case '세무': return 'users';
                    case '노무': return 'hard-hat';
                    case '보험': return 'shield-check';
                    default: return 'briefcase';
                }
            };

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <header className="max-w-6xl mx-auto mb-8 flex flex-col md:flex-row md:items-center justify-between gap-4">
                        <div>
                            <h1 className="text-3xl font-bold text-slate-800 flex items-center gap-2">
                                <Icon name="shield-check" className="text-blue-600" size={32} />
                                KODATA Insight Engine
                            </h1>
                            <p className="text-slate-500 mt-1">기업종합보고서 정밀 분석 시스템</p>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto">
                        {!analysisResult ? (
                            <div className="bg-white rounded-2xl shadow-xl p-8 border border-slate-200">
                                <div 
                                    onDragOver={(e) => { e.preventDefault(); setDragActive(true); }}
                                    onDragLeave={() => setDragActive(false)}
                                    onDrop={(e) => {
                                        e.preventDefault();
                                        setDragActive(false);
                                        const f = e.dataTransfer.files[0];
                                        if (f?.type === 'application/pdf') setFile(f);
                                    }}
                                    className={`border-2 border-dashed rounded-xl p-12 text-center transition-all ${
                                        dragActive ? 'border-blue-500 bg-blue-50' : 'border-slate-300 hover:border-blue-400'
                                    }`}
                                >
                                    <input type="file" id="file-upload" className="hidden" accept=".pdf" onChange={(e) => setFile(e.target.files[0])} />
                                    <label htmlFor="file-upload" className="cursor-pointer flex flex-col items-center">
                                        <div className="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mb-4">
                                            <Icon name="upload" size={32} />
                                        </div>
                                        <h3 className="text-xl font-semibold mb-2">KODATA PDF 업로드</h3>
                                        {file && <p className="text-blue-600 font-medium">{file.name}</p>}
                                    </label>
                                </div>
                                {error && <div className="mt-4 p-4 bg-red-50 text-red-600 rounded-lg">{error}</div>}
                                <button
                                    onClick={() => analyzeReport(file)}
                                    disabled={!file || isAnalyzing}
                                    className={`w-full mt-6 py-4 rounded-xl font-bold text-white shadow-lg flex items-center justify-center gap-2 ${
                                        !file || isAnalyzing ? 'bg-slate-300' : 'bg-blue-600 hover:bg-blue-700'
                                    }`}
                                >
                                    {isAnalyzing ? <Icon name="loader-2" className="animate-spin" /> : '분석 시작'}
                                </button>
                            </div>
                        ) : (
                            <div ref={reportRef} className="space-y-6 pb-12">
                                <div id="download-btn" className="flex justify-end gap-3 no-print">
                                    <button onClick={() => setAnalysisResult(null)} className="flex items-center gap-2 px-4 py-2 bg-white border border-slate-200 rounded-lg text-slate-600 hover:bg-slate-50">
                                        <Icon name="rotate-ccw" size={16} /> 다시 하기
                                    </button>
                                    <button onClick={downloadPDF} className="flex items-center gap-2 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                                        <Icon name="download" size={16} /> PDF 저장
                                    </button>
                                </div>

                                <div className="bg-white rounded-2xl shadow-lg p-8 border-l-8 border-blue-600">
                                    <h2 className="text-2xl font-bold flex items-center gap-2 text-slate-800 mb-4">
                                        <Icon name="check-circle-2" className="text-green-500" /> 종합 분석 요약
                                    </h2>
                                    <p className="text-slate-700 leading-relaxed whitespace-pre-wrap">{analysisResult.summary}</p>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    {analysisResult.expertAnalyses?.map((analysis, idx) => (
                                        <div key={idx} className="bg-white rounded-2xl shadow-md border border-slate-200 overflow-hidden flex flex-col">
                                            <div className="p-5 bg-slate-50 border-b flex justify-between items-center">
                                                <div className="flex items-center gap-3">
                                                    <Icon name={getCategoryIcon(analysis.category)} className="text-blue-500" />
                                                    <span className="font-bold">{analysis.category} 분석</span>
                                                </div>
                                                <span className="text-sm font-bold text-blue-600">{analysis.score}점</span>
                                            </div>
                                            <div className="p-5 space-y-4">
                                                <div>
                                                    <span className="text-xs font-bold text-slate-400 uppercase">핵심 지표</span>
                                                    <p className="p-3 bg-blue-50 rounded-lg mt-1 text-sm">{analysis.metrics}</p>
                                                </div>
                                                <div>
                                                    <span className="text-xs font-bold text-slate-400 uppercase">전문가 진단</span>
                                                    <p className="mt-1 text-sm text-slate-600 leading-relaxed">{analysis.diagnosis}</p>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    
    <!-- External Libraries for PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</body>
</html>
